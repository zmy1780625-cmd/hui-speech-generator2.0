# GitHub Pages 配置文件
title: "晖总演讲稿生成器"
description: "基于AI技术的杨晖风格演讲稿智能生成系统"
author: "AI Assistant"
url: "https://your-username.github.io"
baseurl: "/your-repo-name"

# 主题设置
theme: minima

# 插件
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO 设置
lang: zh-CN
timezone: Asia/Shanghai

# 社交媒体
github_username: your-username

# 构建设置
markdown: kramdown
highlighter: rouge
permalink: pretty

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - "*.bat"
  - "*.py"
  - "*.txt"

# 包含文件
include:
  - _pages